# Trapline Playground
#
# Launches a tmux split-screen environment:
#   Top:    trapline scanning every 5s, findings stream live
#   Bottom: interactive shell to break things
#
# Usage:
#   mise run playground        # build + start + attach
#   mise run playground-down   # tear down

services:
  trapline:
    container_name: trapline-playground
    build:
      context: ..
      dockerfile: dev/Dockerfile.playground
    volumes:
      - ./playground/trapline.yml:/etc/trapline/trapline.yml:ro
    stdin_open: true
    tty: true
