services:
  integration:
    build:
      context: ..
      dockerfile: dev/Dockerfile.test
    volumes:
      - ..:/src:ro
      - go-cache:/root/.cache/go-build
      - go-mod:/root/go/pkg/mod
    tmpfs:
      - /var/lib/trapline
      - /var/log/trapline
      - /etc/trapline
    privileged: false
    security_opt:
      - no-new-privileges:true

volumes:
  go-cache:
  go-mod:
