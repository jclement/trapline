# Playground config — tuned for Docker containers.
# Modules that produce false positives in Docker are disabled.
state_dir: /var/lib/trapline

output:
  console:
    enabled: true
    format: text
    level: info
  tcp:
    enabled: false

defaults:
  interval: 10s
  cooldown: 1h     # suppress duplicate findings for 1 hour (show each finding once)

modules:
  file-integrity:
    enabled: true
    interval: 5s
  packages:
    enabled: false   # dpkg --verify is noisy in Docker (stripped base image)
  ports:
    enabled: true
    interval: 5s
  processes:
    enabled: false   # transient processes (sleep, entrypoint) cause constant churn
  users:
    enabled: true
    interval: 10s
  cron:
    enabled: true
    interval: 10s
  suid:
    enabled: true
    interval: 30s
  ssh:
    enabled: true
    interval: 10s
  permissions:
    enabled: false   # /etc/shadow perms are Docker defaults, not fixable in container
  rootkit:
    enabled: false   # /dev/console is a regular file in Docker (false positive)
  malware:
    enabled: true
    interval: 30s
  containers:
    enabled: false
  network:
    enabled: false   # not useful in a throwaway container
