name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CGO_ENABLED: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: sigstore/cosign-installer@v3
      - run: mise x -- goreleaser release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
