[tools]
go = "latest"
goreleaser = "latest"
golangci-lint = "latest"

[tasks.build]
run = "CGO_ENABLED=0 go build -o trapline ./cmd/trapline"

[tasks.build-linux]
run = "CGO_ENABLED=0 GOOS=linux GOARCH=$(go env GOARCH) go build -o dist/trapline ./cmd/trapline"

[tasks.test]
run = "CGO_ENABLED=0 go test ./..."

[tasks.test-integration]
description = "Run integration tests in Docker (Linux environment)"
run = "docker compose -f dev/docker-compose.test.yml run --rm integration"

[tasks.lint]
run = "CGO_ENABLED=0 golangci-lint run ./..."

[tasks.snapshot]
description = "Build release binaries locally (no publish)"
run = "goreleaser release --snapshot --clean"

[tasks.playground]
description = "Build and launch tmux playground (quit tmux = container dies, clean slate)"
run = """
CGO_ENABLED=0 GOOS=linux GOARCH=$(go env GOARCH) go build -o dist/trapline ./cmd/trapline \
  && docker build -t trapline-playground -f dev/Dockerfile.playground . \
  && docker run -it --rm \
      --name trapline-playground \
      -v "$(pwd)/dev/playground/trapline.yml:/etc/trapline/trapline.yml:ro" \
      trapline-playground
"""

[tasks.test-e2e]
description = "Run Docker-based e2e tests"
run = "./e2e/run.sh"
