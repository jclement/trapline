version: 2

builds:
  - goos: [linux]
    goarch: [amd64, arm64]
    binary: "trapline_{{ .Os }}_{{ .Arch }}"
    main: ./cmd/trapline
    no_unique_dist_dir: true
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - format: binary

checksum:
  name_template: "checksums.txt"

# Keyless signing via GitHub Actions OIDC + Sigstore Fulcio.
# cosign-installer in the release workflow provides the binary;
# id-token:write permission provides the OIDC identity.
# No keys to manage — the signature is tied to the GitHub Actions run.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
